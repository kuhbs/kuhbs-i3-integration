[module/qubes-menu]
type = custom/text
content = "%{O10}"
content-foreground = ${color.foreground}
content-background = #6400A8
content-padding = 0
content-font = 3
click-left = /home/user/.config/i3/kuhbs-integration/i3-kuhbs-menu.py

[module/menu-controls-cap]
type = custom/text
content = 
content-background = ${color.right-controls}
content-foreground = #6400A8
content-font = 2

[module/controls-start]
type = custom/text
content = " "
content-background = ${color.right-controls}
content-foreground = ${color.right-controls}
content-padding = 0

[module/controls-gap]
type = custom/text
content = " "
content-background = ${color.right-controls}
content-foreground = ${color.right-controls}
content-padding = 0

[module/tray-clock-cap]
type = custom/text
content = %{O-2}
content-background = ${color.right-controls}
content-foreground = ${color.right-clock}
content-font = 2

[module/title]
type = custom/script
exec = /home/user/.config/polybar/kuhbs/scripts/active-qube-title-watch.sh
tail = true
format = <label>
format-background = ${color.background}
format-padding = 0
label = %output%

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
index-sort = true
enable-scroll = false
format = <label-state>
format-background = ${color.background}

label-focused = %{T2}%{F#2196F3}%{B#1F1F1F}%{O-1}%{T-}%{F#FFFFFF}%{B#2196F3} %name% %{T2}%{F#2196F3}%{B#1F1F1F}%{T-}
label-focused-background = ${color.background}
label-focused-padding = 0

label-unfocused = " %name% "
label-unfocused-foreground = ${color.foreground}
label-unfocused-background = ${color.background}
label-unfocused-padding = 0

label-visible = " %name% "
label-visible-foreground = ${color.shade8}
label-visible-background = ${color.background}
label-visible-padding = 0

label-urgent = %{T2}%{F#E53935}%{B#1F1F1F}%{O-1}%{T-}%{F#FFFFFF}%{B#E53935} %name% %{T2}%{F#E53935}%{B#1F1F1F}%{T-}
label-urgent-background = ${color.background}
label-urgent-padding = 0

label-separator = " "
label-separator-padding = 0
label-separator-foreground = ${color.background}

[module/tray]
type = internal/tray
format = <tray>
format-background = ${color.right-controls}
tray-background = ${color.right-controls}
tray-spacing = 11px
tray-size = 72%
tray-padding = 0px

[module/tray-seam-fill]
type = custom/text
# The Iosevka Nerd Font left cap leaves a one-pixel dark seam before the tray, so fill only that join
content = " "
content-background = ${color.right-controls}
content-foreground = ${color.right-controls}
content-padding = 0

[module/tray-end]
type = custom/text
content = " "
content-background = ${color.right-controls}
content-foreground = ${color.right-controls}
content-padding = 0

[module/gap]
type = custom/text
content = " "
content-background = ${color.background}
content-foreground = ${color.background}
content-padding = 0

[module/alsa]
type = custom/script
exec = /home/user/.config/polybar/kuhbs/scripts/audio.sh show
interval = 1
format = <label>
format-background = ${color.right-controls}
format-padding = 0
label = "%output% "
label-font = 2
click-left = /home/user/.config/polybar/kuhbs/scripts/audio.sh up
click-right = /home/user/.config/polybar/kuhbs/scripts/audio.sh down
click-middle = /home/user/.config/polybar/kuhbs/scripts/audio.sh zero

[module/backlight]
type = custom/script
exec = /home/user/.config/polybar/kuhbs/scripts/brightness.sh show
interval = 1
format = <label>
format-background = ${color.right-controls}
format-padding = 0
label = "%output% "
label-font = 2
click-left = /home/user/.config/polybar/kuhbs/scripts/brightness.sh up
click-right = /home/user/.config/polybar/kuhbs/scripts/brightness.sh down
click-middle = /home/user/.config/polybar/kuhbs/scripts/brightness.sh max

[module/redshift]
type = custom/script
exec = /home/user/.config/polybar/kuhbs/scripts/redshift.sh show
interval = 1
format = <label>
format-background = ${color.right-controls}
format-padding = 0
label = "%output%"
label-font = 2
click-left = /home/user/.config/polybar/kuhbs/scripts/redshift.sh cooler
click-right = /home/user/.config/polybar/kuhbs/scripts/redshift.sh warmer
click-middle = /home/user/.config/polybar/kuhbs/scripts/redshift.sh reset

[module/running-kuhs]
type = custom/script
# Use --raw-data so qvm-ls does not briefly print "Please wait..." into Polybar.
exec = /home/user/.config/polybar/kuhbs/scripts/running-kuhs.sh
interval = 2
format = <label>
format-background = ${color.right-controls}
format-foreground = ${color.foreground}
format-padding = 0
label = "%output%"
label-font = 4

[module/date]
type = custom/script
exec = TZ=Europe/Berlin date '+%a %b %d %H:%M '
interval = 1
format = <label>
format-background = ${color.right-clock}
format-padding = 1
label = %output%
