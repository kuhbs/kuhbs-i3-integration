[global/wm]
margin-bottom = 0
margin-top = 0

include-file = ~/.config/polybar/kuhbs/colors.ini
include-file = ~/.config/polybar/kuhbs/glyphs.ini
include-file = ~/.config/polybar/kuhbs/modules.ini

[bar/main]
width = 100%
height = 36
background = ${color.background}
foreground = ${color.foreground}

font-0 = "DejaVu Sans Mono:size=11;3"
font-1 = "Iosevka Nerd Font:style=Medium:size=22;5"
font-2 = "Kuhbs Icons:pixelsize=28;3"
font-3 = "DejaVu Sans Mono:style=Bold:size=15;4"

modules-left = qubes-menu menu-controls-cap controls-start running-kuhs controls-gap alsa backlight redshift title
modules-center = i3
modules-right = right7 tray-seam-fill tray tray-end tray-clock-cap date

enable-ipc = true
